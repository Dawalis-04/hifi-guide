{% if site.github.build_revision %}
  {% assign asset_version = site.github.build_revision %}
{% else %}
  {% assign asset_version = site.time | date: "%s" %}
{% endif %}
<link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}">
<link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}?v={{ asset_version }}">
<script defer src="{{ '/assets/js/site.js' | relative_url }}?v={{ asset_version }}"></script>
