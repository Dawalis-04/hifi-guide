<svg xmlns="http://www.w3.org/2000/svg" width="920" height="480" viewBox="0 0 920 480" role="img" aria-labelledby="title desc">
  <title id="title">示例耳机A与B的频响曲线比较</title>
  <desc id="desc">示例A为绿色实线，低频较少、2到4千赫兹和高频相对更高；示例B为红色虚线，低频较多、中高频相对柔和。两条曲线仅用于教学，不是实测数据。</desc>
  <rect width="920" height="480" fill="#ffffff"/>
  <rect x="90" y="58" width="760" height="332" rx="6" fill="#f7faf8" stroke="#d8dfdb"/>
  <rect x="90" y="58" width="286" height="332" fill="#e7f2ed" opacity="0.7"/><rect x="376" y="58" width="312" height="332" fill="#e8f1f7" opacity="0.7"/><rect x="688" y="58" width="162" height="332" fill="#fff3df" opacity="0.7"/>
  <g stroke="#d8dfdb" stroke-width="1"><path d="M90 88H850M90 166H850M90 244H850M90 322H850M90 390H850"/><path d="M90 58V390M194 58V390M272 58V390M376 58V390M454 58V390M532 58V390M610 58V390M688 58V390M766 58V390M850 58V390"/></g>
  <path d="M90 244H850" stroke="#7d8a85" stroke-width="2"/>
  <path d="M90 238 C160 230 222 226 272 230 C330 234 356 239 376 238 C440 233 504 214 552 176 C584 150 618 143 646 170 C674 194 680 215 688 220 C718 211 738 166 766 172 C792 181 812 204 850 217" fill="none" stroke="#126b55" stroke-width="5" stroke-linecap="round"/>
  <path d="M90 153 C160 139 224 148 272 166 C326 188 350 219 376 229 C448 235 512 234 562 239 C610 246 650 247 688 244 C726 241 746 226 766 232 C794 239 818 247 850 250" fill="none" stroke="#bd4d3d" stroke-width="5" stroke-dasharray="12 9" stroke-linecap="round"/>
  <g font-family="Microsoft YaHei UI, PingFang SC, sans-serif" fill="#44514d" font-size="22"><text x="74" y="94" text-anchor="end">+10</text><text x="74" y="172" text-anchor="end">+5</text><text x="74" y="250" text-anchor="end">0</text><text x="74" y="328" text-anchor="end">-5</text><text x="74" y="396" text-anchor="end">-10</text><text x="90" y="418" text-anchor="middle">20</text><text x="194" y="418" text-anchor="middle">50</text><text x="272" y="418" text-anchor="middle">100</text><text x="376" y="418" text-anchor="middle">250</text><text x="454" y="418" text-anchor="middle">500</text><text x="532" y="418" text-anchor="middle">1k</text><text x="610" y="418" text-anchor="middle">2k</text><text x="688" y="418" text-anchor="middle">4k</text><text x="766" y="418" text-anchor="middle">8k</text><text x="850" y="418" text-anchor="middle">20k</text><text x="470" y="458" text-anchor="middle" font-size="26" font-weight="700">频率（Hz，对数刻度）</text><text x="28" y="224" text-anchor="middle" transform="rotate(-90 28 224)" font-size="26" font-weight="700">相对电平（dB）</text></g>
  <g font-family="Microsoft YaHei UI, PingFang SC, sans-serif" font-size="26" font-weight="800"><text x="718" y="122" fill="#126b55">示例A · 实线</text><text x="718" y="284" fill="#bd4d3d">示例B · 虚线</text><text x="470" y="86" text-anchor="middle" fill="#44514d">教学示意，非实测数据</text></g>
</svg>
